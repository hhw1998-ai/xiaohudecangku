name: Daily Bailing Collection

on:
  schedule:
    # GitHub Actions uses UTC. 23:15 UTC is 07:15 Beijing time.
    - cron: "15 23 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Render collection endpoint
        shell: bash
        run: |
          set -euo pipefail
          API_URL="${BAILING_API_URL:-https://bailing-zhigeng-api.onrender.com}"
          ENDPOINT="${API_URL%/}/api/collect/run"
          echo "Triggering ${ENDPOINT}"

          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}"
            status="$(curl -sS -m 240 -w '%{http_code}' -o response.json \
              -X POST "${ENDPOINT}" \
              -H 'Content-Type: application/json' \
              --data '{}')" || status="000"

            cat response.json || true
            echo
            echo "HTTP status: ${status}"

            if [ "${status}" = "200" ]; then
              python - <<'PY'
import json
from pathlib import Path

payload = json.loads(Path("response.json").read_text())
if not payload.get("ok"):
    raise SystemExit(f"collection returned ok=false: {payload}")
print("collection ok:", json.dumps(payload, ensure_ascii=False))
PY
              exit 0
            fi

            sleep $((attempt * 20))
          done

          echo "Collection failed after retries"
          exit 1

      - name: Verify health after collection
        if: success()
        shell: bash
        run: |
          API_URL="${BAILING_API_URL:-https://bailing-zhigeng-api.onrender.com}"
          curl -sS -m 60 "${API_URL%/}/api/health"
